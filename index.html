<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #d8d4cc;
      --border-light: #ece9e3;
      --text: #1a1916;
      --text-muted: #8a8780;
      --accent: #3d5afe;
      --accent-light: #e8ecff;
      --checked-bg: #f0f9f0;
      --checked-text: #a0b8a0;
      --header-bg: #f0ede7;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --radius: 6px;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 80px;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-group h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .title-group .subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
    }

    .week-nav button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .week-nav button:hover { color: var(--text); background: var(--border-light); }

    .week-label {
      font-size: 0.75rem;
      color: var(--text);
      font-weight: 500;
      min-width: 100px;
      text-align: center;
    }

    .btn-add-col {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      background: var(--surface);
      border: 1px dashed var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .btn-add-col:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* TABLE */
    .table-wrap {
      max-width: 1100px;
      margin: 0 auto;
      overflow-x: auto;
      border-radius: 10px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.col-day  { width: 88px; }
    col.col-task { min-width: 180px; }

    thead th {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border-light);
      padding: 10px 14px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th:last-child { border-right: none; }

    thead th.col-header-editable {
      cursor: pointer;
    }
    thead th.col-header-editable input {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      width: 100%;
      padding: 0;
    }

    .th-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .btn-del-col {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 0.9rem;
      line-height: 1;
      padding: 2px;
      border-radius: 3px;
      transition: color 0.15s;
      opacity: 0;
    }
    thead th:hover .btn-del-col { opacity: 1; }
    .btn-del-col:hover { color: #e55; }

    /* ROWS */
    tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover > td.day-cell { background: #faf9f7; }

    td {
      vertical-align: top;
      border-right: 1px solid var(--border-light);
      padding: 0;
    }
    td:last-child { border-right: none; }

    .day-cell {
      padding: 12px 14px;
      white-space: nowrap;
      background: var(--header-bg);
      border-right: 1px solid var(--border) !important;
    }

    .day-name {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .day-num {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 300;
      line-height: 1;
      margin-top: 2px;
      color: var(--text);
    }
    tr.today .day-num { color: var(--accent); }
    tr.today .day-cell { background: var(--accent-light); }

    /* TASK CELL */
    .task-cell {
      padding: 8px 10px;
      min-height: 64px;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 4px;
      border-radius: 4px;
      transition: background 0.1s;
      group: true;
    }
    .task-item:hover { background: var(--border-light); }

    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--surface);
      transition: all 0.15s;
      position: relative;
    }
    .task-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: 1.5px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-text {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text);
      flex: 1;
      cursor: text;
      word-break: break-word;
      outline: none;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      resize: none;
      padding: 0;
      min-width: 0;
      transition: color 0.15s;
    }
    .task-text:empty::before {
      content: attr(placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    .task-item.done .task-text {
      color: var(--checked-text);
      text-decoration: line-through;
    }

    .task-duration {
      font-size: 0.65rem;
      color: var(--text-muted);
      white-space: nowrap;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .btn-del-task {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 0.8rem;
      line-height: 1;
      padding: 2px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.15s;
      opacity: 0;
      margin-top: 2px;
    }
    .task-item:hover .btn-del-task { opacity: 1; }
    .btn-del-task:hover { color: #e55; }

    /* ADD TASK */
    .btn-add-task {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      transition: color 0.15s, background 0.15s;
      opacity: 0;
    }
    .task-cell:hover .btn-add-task { opacity: 1; }
    .btn-add-task:hover { color: var(--accent); background: var(--accent-light); }

    /* DURATION MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transform: translateY(8px);
      transition: transform 0.15s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    .modal label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    .modal input[type="text"] {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      outline: none;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }

    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-primary, .btn-secondary {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 7px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2a45e8; }
    .btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text-muted); }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

    /* SAVE STATUS */
    .save-indicator {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      transition: opacity 0.3s;
    }

    @media (max-width: 600px) {
      col.col-day { width: 60px; }
      .day-name { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="title-group">
    <h1>Weekly Planner</h1>
    <div class="subtitle" id="week-subtitle"></div>
  </div>
  <div class="header-controls">
    <span class="save-indicator" id="save-indicator">All changes saved</span>
    <div class="week-nav">
      <button id="prev-week" title="Previous week">‹</button>
      <span class="week-label" id="week-label"></span>
      <button id="next-week" title="Next week">›</button>
    </div>
    <button class="btn-add-col" id="add-col-btn">+ Add column</button>
  </div>
</header>

<div class="table-wrap">
  <table id="planner-table">
    <colgroup id="colgroup">
      <col class="col-day" />
    </colgroup>
    <thead>
      <tr id="header-row">
        <th>Day</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add Task</h3>
    <label for="modal-task-name">Task name</label>
    <input type="text" id="modal-task-name" placeholder="e.g. Send LSE PS" maxlength="80" />
    <label for="modal-duration">Duration (optional)</label>
    <input type="text" id="modal-duration" placeholder="e.g. 2h, 30min" maxlength="10" />
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-confirm">Add Task</button>
    </div>
  </div>
</div>

<script>
  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const STORAGE_KEY = 'weekly_planner_v2';

  // ─── STATE ────────────────────────────────────────────────────────────────────
  let weekOffset = 0;  // 0 = current week
  let columns = [];    // [{id, name}]
  let tasks = {};      // {`${dateStr}_${colId}`: [{id, text, done, duration}]}

  function getWeekStart(offset = 0) {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
    monday.setHours(0, 0, 0, 0);
    return monday;
  }

  function dateStr(date) {
    return date.toISOString().slice(0, 10);
  }

  function taskKey(date, colId) {
    return `${dateStr(date)}_${colId}`;
  }

  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  // ─── PERSISTENCE ──────────────────────────────────────────────────────────────
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ columns, tasks }));
      flashSave();
    } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        columns = d.columns || [];
        tasks = d.tasks || {};
      }
    } catch(e) {}
    if (!columns.length) {
      columns = [
        { id: uid(), name: 'Errands' },
        { id: uid(), name: 'Task 1' },
        { id: uid(), name: 'Task 2' },
        { id: uid(), name: 'Task 3' },
      ];
    }
  }

  let saveTimer = null;
  function flashSave() {
    const el = document.getElementById('save-indicator');
    el.textContent = 'Saved ✓';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { el.textContent = 'All changes saved'; }, 1500);
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────────
  function render() {
    const weekStart = getWeekStart(weekOffset);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);

    // Week label
    document.getElementById('week-label').textContent =
      `${MONTH_NAMES[weekStart.getMonth()]} ${weekStart.getDate()} – ${weekStart.getDate() + 6}`;
    document.getElementById('week-subtitle').textContent =
      `Week of ${DAY_NAMES[weekStart.getDay()]}, ${weekStart.getDate()} ${MONTH_NAMES[weekStart.getMonth()]} ${weekStart.getFullYear()}`;

    // Colgroup
    const cg = document.getElementById('colgroup');
    cg.innerHTML = '<col class="col-day" />';
    columns.forEach(() => {
      const c = document.createElement('col');
      c.className = 'col-task';
      cg.appendChild(c);
    });

    // Header
    const hr = document.getElementById('header-row');
    hr.innerHTML = '<th>Day</th>';
    columns.forEach(col => {
      const th = document.createElement('th');
      th.className = 'col-header-editable';
      th.innerHTML = `
        <div class="th-actions">
          <input type="text" value="${escHtml(col.name)}" data-col="${col.id}" class="col-name-input" maxlength="30" />
          <button class="btn-del-col" data-col="${col.id}" title="Remove column">×</button>
        </div>`;
      hr.appendChild(th);
    });

    // Bind header events
    hr.querySelectorAll('.col-name-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const col = columns.find(c => c.id === e.target.dataset.col);
        if (col) { col.name = e.target.value; save(); }
      });
    });
    hr.querySelectorAll('.btn-del-col').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (columns.length <= 1) return alert('You need at least one column.');
        if (!confirm('Remove this column and all its tasks?')) return;
        const id = btn.dataset.col;
        columns = columns.filter(c => c.id !== id);
        // remove tasks for this col
        Object.keys(tasks).forEach(k => { if (k.endsWith('_' + id)) delete tasks[k]; });
        save(); render();
      });
    });

    // Body
    const today = dateStr(new Date());
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';

    for (let i = 0; i < 7; i++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate() + i);
      const ds = dateStr(date);
      const isToday = ds === today;

      const tr = document.createElement('tr');
      if (isToday) tr.classList.add('today');

      // Day cell
      const dayTd = document.createElement('td');
      dayTd.className = 'day-cell';
      dayTd.innerHTML = `<div class="day-name">${DAY_NAMES[date.getDay()]}</div><div class="day-num">${date.getDate()}</div>`;
      tr.appendChild(dayTd);

      // Task columns
      columns.forEach(col => {
        const td = document.createElement('td');
        td.className = 'task-cell';
        const key = taskKey(date, col.id);
        const items = tasks[key] || [];

        const ul = document.createElement('ul');
        ul.className = 'task-list';

        items.forEach(task => {
          ul.appendChild(makeTaskEl(task, key));
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-task';
        addBtn.innerHTML = '＋ add';
        addBtn.addEventListener('click', () => openModal(key));

        td.appendChild(ul);
        td.appendChild(addBtn);
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    }
  }

  function makeTaskEl(task, key) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' done' : '');
    li.dataset.task = task.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'task-check';
    cb.checked = task.done;
    cb.addEventListener('change', () => {
      task.done = cb.checked;
      li.classList.toggle('done', task.done);
      save();
    });

    const span = document.createElement('div');
    span.className = 'task-text';
    span.contentEditable = 'true';
    span.setAttribute('placeholder', 'Task…');
    span.textContent = task.text;
    span.addEventListener('input', () => { task.text = span.textContent; save(); });
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
    });

    const del = document.createElement('button');
    del.className = 'btn-del-task';
    del.title = 'Delete task';
    del.textContent = '×';
    del.addEventListener('click', () => {
      tasks[key] = (tasks[key] || []).filter(t => t.id !== task.id);
      save(); render();
    });

    li.appendChild(cb);
    li.appendChild(span);

    if (task.duration) {
      const dur = document.createElement('span');
      dur.className = 'task-duration';
      dur.textContent = `(${task.duration})`;
      li.appendChild(dur);
    }

    li.appendChild(del);
    return li;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── MODAL ────────────────────────────────────────────────────────────────────
  let pendingKey = null;

  function openModal(key) {
    pendingKey = key;
    document.getElementById('modal-task-name').value = '';
    document.getElementById('modal-duration').value = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('modal-task-name').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    pendingKey = null;
  }

  function confirmModal() {
    const name = document.getElementById('modal-task-name').value.trim();
    if (!name) return;
    const duration = document.getElementById('modal-duration').value.trim();
    if (!tasks[pendingKey]) tasks[pendingKey] = [];
    tasks[pendingKey].push({ id: uid(), text: name, done: false, duration });
    save(); render(); closeModal();
  }

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', confirmModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
      confirmModal();
    }
  });

  // ─── CONTROLS ─────────────────────────────────────────────────────────────────
  document.getElementById('prev-week').addEventListener('click', () => { weekOffset--; render(); });
  document.getElementById('next-week').addEventListener('click', () => { weekOffset++; render(); });

  document.getElementById('add-col-btn').addEventListener('click', () => {
    columns.push({ id: uid(), name: 'New Column' });
    save(); render();
    // focus the new header input
    const inputs = document.querySelectorAll('.col-name-input');
    if (inputs.length) { const last = inputs[inputs.length - 1]; last.focus(); last.select(); }
  });

  // ─── INIT ─────────────────────────────────────────────────────────────────────
  load();
  render();
</script>
</body>
</html>
